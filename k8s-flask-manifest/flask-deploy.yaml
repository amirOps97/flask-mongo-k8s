apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: amirdehdari/flask-mongo:2.1.0
          resources:
            requests:
              cpu: 100m        
              memory: 128Mi
            limits:
              cpu: 500m        
              memory: 256Mi
          ports:
            - containerPort: 5000
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-username
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: mongo-root-password
            - name: MONGO_HOST
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: MONGO_HOST
            - name: MONGO_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: MONGO_DATABASE
            - name: MONGO_REPLICA_SET
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: MONGO_REPLICA_SET
            - name: MONGO_AUTH_SOURCE
              valueFrom:
                configMapKeyRef:
                  name: flask-app-config
                  key: MONGO_AUTH_SOURCE
            - name: MONGO_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PASS)@$(MONGO_HOST)/$(MONGO_DATABASE)?replicaSet=$(MONGO_REPLICA_SET)&authSource=$(MONGO_AUTH_SOURCE)"